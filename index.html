<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INK-GEN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ink-black: #050505; --stencil-blue: #38bdf8; --gold: #f59e0b; --skin-tone: #f3d5b5; }
        body { font-family: 'Outfit', sans-serif; background: var(--ink-black); color: white; margin: 0; overflow: hidden; height: 100vh; }
        .header-font { font-family: 'Orbitron', sans-serif; }
        
        /* Pages */
        #homePage, #studioPage { height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; }
        #studioPage { display: none; }

        /* Subscription Styles */
        .sub-btn {
            width: 100%; padding: 0.8rem; border-radius: 12px; margin-top: 0.5rem;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white;
        }
        .featured { border-color: var(--stencil-blue); background: rgba(56, 189, 248, 0.1); }
        
        .credit-badge {
            background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--gold); padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 10px; font-weight: 900;
        }

        #subOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Studio Elements */
        #artFrame { background: white; width: 300px; height: 300px; position: relative; border-radius: 8px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        .skin-overlay { position: absolute; inset: 0; background: var(--skin-tone); mix-blend-mode: multiply; opacity: 0; pointer-events: none; }
        .preview-active .skin-overlay { opacity: 1; }
        
        .compact-input { background: #111; border: 1px solid #333; padding: 10px; border-radius: 8px; color: white; width: 100%; }
        .gen-btn { background: var(--stencil-blue); color: black; padding: 12px; border-radius: 8px; width: 100%; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="subOverlay">
        <h2 class="header-font text-xl mb-4 text-sky-400">OUT OF INK</h2>
        <div class="w-64">
            <button onclick="purchase(50)" class="sub-btn"><span>50 INK</span><span>$19.99</span></button>
            <button onclick="purchase(100)" class="sub-btn featured"><span>100 INK</span><span>$49.99</span></button>
        </div>
        <button onclick="hideSub()" class="mt-6 text-[10px] opacity-50 uppercase">Maybe Later</button>
    </div>

    <div id="homePage" class="p-8 text-center">
        <h1 class="header-font text-3xl mt-20 mb-2">INK-GEN <span class="text-sky-400">PRO</span></h1>
        <div class="bg-white/5 border border-white/10 p-6 rounded-2xl w-full max-w-xs mt-10">
            <button id="startBtn" class="gen-btn mb-6">START SESSION</button>
            <div class="border-t border-white/10 pt-4">
                <p class="text-[8px] opacity-30 mb-2 uppercase">Subscription Plans</p>
                <button onclick="purchase(50)" class="sub-btn"><span>50 INK</span><span>$19.99</span></button>
                <button onclick="purchase(100)" class="sub-btn featured"><span>100 INK</span><span>$49.99</span></button>
            </div>
        </div>
    </div>

    <div id="studioPage">
        <div class="w-full p-4 flex justify-between items-center border-b border-white/10">
            <button onclick="goHome()" class="text-xs opacity-50">BACK</button>
            <div class="credit-badge">INK: <span id="inkVal">3</span></div>
            <button id="skinTog" class="text-[10px] border border-white/20 p-1 rounded">SKIN PREVIEW</button>
        </div>

        <div class="flex-1 flex items-center justify-center">
            <div id="artFrame">
                <div class="skin-overlay"></div>
                <canvas id="canvas"></canvas>
            </div>
        </div>

        <div class="w-full p-6 bg-black">
            <input type="text" id="prompt" placeholder="DESCRIBE DESIGN" class="compact-input">
            <button id="genBtn" class="gen-btn">GENERATE</button>
        </div>
    </div>

    <script>
        const BACKEND = "https://ink-gen-api-365969989524.us-central1.run.app";
        let credits = 3;

        // Navigation
        document.getElementById('startBtn').onclick = () => {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('studioPage').style.display = 'flex';
        };

        function goHome() {
            document.getElementById('homePage').style.display = 'flex';
            document.getElementById('studioPage').style.display = 'none';
        }

        // Subscriptions
        window.purchase = (amt) => {
            credits += amt;
            document.getElementById('inkVal').innerText = credits;
            document.getElementById('subOverlay').style.display = 'none';
            alert("Refill Successful!");
        };

        function hideSub() { document.getElementById('subOverlay').style.display = 'none'; }

        // Generator
        document.getElementById('genBtn').onclick = async () => {
            if(credits <= 0) {
                document.getElementById('subOverlay').style.display = 'flex';
                return;
            }

            const p = document.getElementById('prompt').value;
            if(!p) return;

            try {
                document.getElementById('genBtn').innerText = "INKING...";
                const res = await fetch(BACKEND, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'generate', prompt: "tattoo " + p })
                });
                const data = await res.json();
                if(data.predictions) {
                    credits--;
                    document.getElementById('inkVal').innerText = credits;
                    const img = new Image();
                    img.onload = () => {
                        const ctx = document.getElementById('canvas').getContext('2d');
                        ctx.drawImage(img, 0, 0, 300, 300);
                        document.getElementById('genBtn').innerText = "GENERATE";
                    };
                    img.src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                }
            } catch(e) {
                document.getElementById('genBtn').innerText = "GENERATE";
            }
        };

        document.getElementById('skinTog').onclick = () => {
            document.getElementById('artFrame').classList.toggle('preview-active');
        };
    </script>
</body>
</html>
