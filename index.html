    <style>
        :root {
            --ink-black: #050505;
            --stencil-blue: #38bdf8;
            --skin-tone: #f3d5b5;
            --gold: #f59e0b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none;
        }
        ::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--ink-black);
            color: #f8fafc;
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
        }

        .header-font { font-family: 'Orbitron', sans-serif; }

        /* SCROLLABLE HOME */
        #homePage { 
            display: flex; 
            flex-direction: column;
            height: 100dvh; 
            overflow-y: auto; 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            align-items: center;
            padding: 2rem 1rem;
        }

        .home-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 340px;
            text-align: center;
        }

        /* SUBSCRIPTION BUTTONS */
        .sub-btn {
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            margin-top: 0.75rem;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .sub-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .sub-btn.featured { border-color: var(--stencil-blue); background: rgba(56, 189, 248, 0.1); }

        /* STUDIO PAGE */
        #studioPage { 
            display: none; 
            flex-direction: column;
            height: 100dvh; 
            width: 100vw;
            position: relative;
        }

        .studio-header {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(5, 5, 5, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
