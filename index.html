<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="referrer" content="no-referrer-when-downgrade">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INK-GEN PRO | Professional Tattoo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-black: #050505;
            --stencil-blue: #38bdf8;
            --skin-tone: #f3d5b5;
            --gold: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--ink-black);
            color: #f8fafc;
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden; position: fixed;
        }

        .header-font { font-family: 'Orbitron', sans-serif; }

        /* SCROLLABLE HOME */
        #homePage { 
            display: flex; flex-direction: column;
            height: 100dvh; overflow-y: auto; 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            align-items: center; padding: 2rem 1rem;
        }

        .home-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem; padding: 1.5rem;
            width: 100%; max-width: 340px; text-align: center;
        }

        /* SUBSCRIPTION UI */
        .sub-btn {
            width: 100%; padding: 0.8rem; border-radius: 12px; margin-top: 0.75rem;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.05em; display: flex; justify-content: space-between;
            align-items: center; transition: 0.2s; color: white;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
        }
        .sub-btn.featured { border-color: var(--stencil-blue); background: rgba(56, 189, 248, 0.1); }

        .credit-badge {
            background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--gold); padding: 0.4rem 0.6rem; border-radius: 6px;
            font-size: 8px; font-weight: 900; display: flex; align-items: center; gap: 4px;
        }

        #subOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
        }

        /* STUDIO PAGE */
        #studioPage { display: none; flex-direction: column; height: 100dvh; width: 100vw; position: relative; }
        .studio-header {
            padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(5, 5, 5, 0.9); display: flex; justify-content: space-between; align-items: center;
        }
        .studio-footer {
            padding: 0.75rem; padding-bottom: calc(env(safe-area-inset-bottom, 0.5rem) + 0.75rem);
            background: rgba(5, 5, 5, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; background: #000; position: relative; }
        #artFrame {
            background: white; position: relative; width: min(85vw, 60vh); height: min(85vw, 60vh);
            border-radius: 4px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        canvas { width: 100%; height: 100%; background: white; }
        
        .skin-overlay { position: absolute; inset: 0; background: var(--skin-tone); mix-blend-mode: multiply; opacity: 0; pointer-events: none; transition: 0.4s; }
        #artFrame.preview-active .skin-overlay { opacity: 1; }

        .style-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem 0.75rem; border-radius: 6px; font-size: 8px; font-weight: 800; text-transform: uppercase; color: #94a3b8; white-space: nowrap; }
        .style-btn.active { background: var(--stencil-blue); color: black; border-color: var(--stencil-blue); }

        .compact-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.85rem 1rem; font-size: 11px; width: 100%; color: white; outline: none; }
        .gen-btn { background: var(--stencil-blue); color: black; padding: 0.85rem; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; width: 100%; }

        .skin-swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; }
        .skin-swatch.active { border-color: var(--stencil-blue); scale: 1.1; }

        #loader { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .ring { width: 30px; height: 30px; border: 2px solid rgba(56,189,248,0.1); border-top: 2px solid var(--stencil-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #notification { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 0.75rem 1.5rem; border-radius: 12px; font-size: 10px; font-weight: 700; z-index: 2000; display: none; }
    </style>
</head>
<body>

    <div id="notification"></div>

    <div id="subOverlay">
        <h2 class="header-font text-2xl font-black mb-2">OUT OF <span class="text-sky-400">INK</span></h2>
        <p class="text-[10px] opacity-40 uppercase tracking-widest mb-8">Refill your creative potential</p>
        <div class="w-full max-w-[300px]">
            <button onclick="window.purchasePlan(50, 'Fun Plan')" class="sub-btn"><span>Fun Plan (50)</span><span class="text-sky-400">$19.99</span></button>
