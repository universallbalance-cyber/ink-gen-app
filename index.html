<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INK-GEN PRO | Professional Tattoo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ink-black: #050505; --stencil-blue: #38bdf8; --skin-tone: #f3d5b5; --gold: #f59e0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }
        body { font-family: 'Outfit', sans-serif; background: var(--ink-black); color: #f8fafc; margin: 0; padding: 0; height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        .header-font { font-family: 'Orbitron', sans-serif; }

        #homePage { display: flex; flex-direction: column; height: 100dvh; overflow-y: auto; background: radial-gradient(circle at center, #111 0%, #000 100%); align-items: center; padding: 2rem 1rem; }
        #studioPage { display: none; flex-direction: column; height: 100dvh; width: 100vw; position: relative; }
        
        .home-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 1.5rem; width: 100%; max-width: 320px; text-align: center; }
        
        .style-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.4rem 0.75rem; border-radius: 6px; font-size: 8px; font-weight: 800; text-transform: uppercase; color: #94a3b8; white-space: nowrap; flex-shrink: 0; }
        .style-btn.active { background: var(--stencil-blue); color: black; border-color: var(--stencil-blue); }

        .studio-header { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: rgba(5, 5, 5, 0.9); display: flex; justify-content: space-between; align-items: center; }
        .canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; background: #000; position: relative; }
        #artFrame { background: white; position: relative; width: min(85vw, 60vh); height: min(85vw, 60vh); border-radius: 4px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .skin-overlay { position: absolute; inset: 0; background: var(--skin-tone); mix-blend-mode: multiply; opacity: 0; pointer-events: none; transition: 0.4s; }
        #artFrame.preview-active .skin-overlay { opacity: 1; }
        canvas { width: 100%; height: 100%; object-fit: contain; }

        .gen-btn { background: var(--stencil-blue); color: black; padding: 0.85rem; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; width: 100%; }
        .compact-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.85rem 1rem; font-size: 11px; width: 100%; color: white; outline: none; }
        
        .music-pop { position: absolute; top: 110%; left: 0; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); width: 140px; border-radius: 8px; opacity: 0; pointer-events: none; transition: 0.2s; z-index: 100; }
        .music-pop.show { opacity: 1; pointer-events: auto; }
        .track-item { padding: 0.6rem 0.8rem; font-size: 9px; font-weight: 700; text-transform: uppercase; color: #475569; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .track-item.active { color: var(--stencil-blue); }

        #loader { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .ring { width: 30px; height: 30px; border: 2px solid rgba(56,189,248,0.1); border-top: 2px solid var(--stencil-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .skin-swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .skin-swatch.active { border-color: var(--stencil-blue); transform: scale(1.1); }
        .credit-badge { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--gold); padding: 0.4rem 0.6rem; border-radius: 6px; font-size: 8px; font-weight: 900; display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>

    <div id="homePage">
        <div class="mt-12 mb-8 text-center">
            <h1 class="header-font text-4xl font-black italic tracking-tighter mb-1">INK-GEN <span class="text-sky-400">PRO</span></h1>
            <p class="text-[8px] tracking-[0.4em] opacity-30 font-bold uppercase">Tattoo Image Generating Engine</p>
        </div>

        <div class="home-card shadow-2xl">
            <h2 class="header-font text-[9px] tracking-[0.2em] opacity-50 uppercase mb-6">Select Base Canvas</h2>
            <div class="flex justify-between mb-8">
                <div class="skin-swatch active" style="background: #f3d5b5;" data-color="#f3d5b5"></div>
                <div class="skin-swatch" style="background: #e5c298;" data-color="#e5c298"></div>
                <div class="skin-swatch" style="background: #c69061;" data-color="#c69061"></div>
                <div class="skin-swatch" style="background: #8d5524;" data-color="#8d5524"></div>
                <div class="skin-swatch" style="background: #3c2005;" data-color="#3c2005"></div>
            </div>
            <button id="enterStudio" class="gen-btn">Start Session</button>
        </div>
        
        <div class="mt-12 text-center">
            <div class="opacity-30 text-[8px] uppercase tracking-widest font-bold">By MICHAEL TAYLOR & UNIVERSALL BALANCE</div>
            <a href="privacy.html" class="block mt-4 text-[7px] opacity-20 uppercase tracking-widest">Privacy Policy</a>
        </div>
    </div>

    <div id="studioPage">
        <header class="studio-header">
            <div class="flex items-center gap-1 relative">
                <button id="goHome" class="p-2 opacity-30 mr-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></button>
                <button id="playBtn" class="style-btn !px-3">▶</button>
                <button id="musicMenu" class="style-btn min-w-[70px]">Track I</button>
                <div id="musicPop" class="music-pop">
                    <div class="track-item active" data-idx="0">Spiritual I</div>
                    <div class="track-item" data-idx="1">Spiritual II</div>
                    <div class="track-item" data-idx="2">Spiritual III</div>
                </div>
            </div>

            <div class="flex gap-2 items-center">
                <div class="credit-badge">
                    <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
                    <span id="inkVal">PRO</span>
                </div>
                <button id="skinTog" class="style-btn">Preview</button>
                <button id="dlBtn" class="style-btn !px-2"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></button>
            </div>
        </header>

        <div class="canvas-container">
            <div id="artFrame">
                <div class="skin-overlay"></div>
                <canvas id="tattooCanvas"></canvas>
                <div id="loader"><div class="ring"></div></div>
            </div>
        </div>

        <footer class="p-4 bg-black/95 border-t border-white/5">
            <div class="flex gap-2 overflow-x-auto pb-4 mb-2 no-scrollbar">
                <button class="style-btn active" data-style="fineline">Fine Line</button>
                <button class="style-btn" data-style="singlism">Singlism</button>
                <button class="style-btn" data-style="blackwork">Blackwork</button>
                <button class="style-btn" data-style="tribal">Tribal</button>
                <button class="style-btn" data-style="izumi">Izumi</button>
                <button class="style-btn" data-style="skulls">Skulls</button>
                <button class="style-btn" data-style="neo trad">Neo Trad</button>
                <button class="style-btn" data-style="disney">Disney</button>
                <button class="style-btn" data-style="japanese">Japanese</button>
                <button class="style-btn" data-style="cyber">Cyber</button>
                <button class="style-btn" data-style="traditional">Trad</button>
            </div>
            <div class="flex flex-col gap-2">
                <input type="text" id="promptInput" placeholder="DESCRIBE DESIGN CONCEPT" class="compact-input">
                <button id="generateBtn" class="gen-btn">Generate Ink</button>
            </div>
        </footer>
    </div>

    <audio id="player" loop></audio>

    <script>
        const BACKEND_URL = "https://ink-gen-api-365969989524.us-central1.run.app";
        let selectedStyle = 'fineline';
        let isPlaying = false;
        const playlist = [
            { name: "Track I", url: "https://assets.zyrosite.com/dOq4ypO8x6fPq8OL/spiritual_1-A85M802pl8svjrLd.mp3" },
            { name: "Track II", url: "https://assets.zyrosite.com/dOq4ypO8x6fPq8OL/spiritual_2-YyvD1V0LMOTeDz76.mp3" },
            { name: "Track III", url: "https://assets.zyrosite.com/dOq4ypO8x6fPq8OL/spiritual_3-Aq2GPVJQn1fjKLKo.mp3" }
        ];

        const canvas = document.getElementById('tattooCanvas');
        const ctx = canvas.getContext('2d');
        const player = document.getElementById('player');

        function initCanvas() {
            canvas.width = 1024; canvas.height = 1024;
            ctx.fillStyle = "white"; ctx.fillRect(0,0,1024,1024);
        }

        async function generate() {
            const btn = document.getElementById('generateBtn');
            const p = document.getElementById('promptInput').value;
            if (!p) return;
            try {
                btn.disabled = true; document.getElementById('loader').style.display = 'flex';
                const res = await fetch(BACKEND_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'generate', prompt: selectedStyle + " tattoo " + p })
                });
                const data = await res.json();
                if (data.predictions) {
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, 1024, 1024);
                        document.getElementById('loader').style.display = 'none';
                        btn.disabled = false;
                    };
                    img.src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                }
            } catch (e) { document.getElementById('loader').style.display = 'none'; btn.disabled = false; }
        }

        // Fix: Added event listeners properly to ensure buttons work
        document.getElementById('enterStudio').addEventListener('click', () => {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('studioPage').style.display = 'flex';
            initCanvas();
        });

        document.getElementById('goHome').addEventListener('click', () => {
            document.getElementById('homePage').style.display = 'flex';
            document.getElementById('studioPage').style.display = 'none';
        });

        document.getElementById('generateBtn').addEventListener('click', generate);

        document.getElementById('playBtn').onclick = () => {
            if (!player.src) player.src = playlist[0].url;
            if (isPlaying) { player.pause(); document.getElementById('playBtn').innerText = "▶"; }
            else { player.play(); document.getElementById('playBtn').innerText = "⏸"; }
            isPlaying = !isPlaying;
        };

        document.getElementById('musicMenu').onclick = () => document.getElementById('musicPop').classList.toggle('show');
        document.querySelectorAll('.track-item').forEach(item => {
            item.onclick = () => {
                player.src = playlist[item.dataset.idx].url;
                document.getElementById('musicMenu').innerText = playlist[item.dataset.idx].name;
                if (isPlaying) player.play();
                document.getElementById('musicPop').classList.remove('show');
            };
        });

        document.getElementById('skinTog').onclick = () => document.getElementById('artFrame').classList.toggle('preview-active');
        document.getElementById('dlBtn').onclick = () => {
            const link = document.createElement('a'); link.download = 'ink.png';
            link.href = canvas.toDataURL(); link.click();
        };

        document.querySelectorAll('.skin-swatch').forEach(sw => {
            sw.onclick = () => {
                document.querySelectorAll('.skin-swatch').forEach(s => s.classList.remove('active'));
                sw.classList.add('active');
                document.documentElement.style.setProperty('--skin-tone', sw.dataset.color);
            };
        });

        document.querySelectorAll('[data-style]').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('[data-style]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedStyle = btn.dataset.style;
            };
        });
    </script>
</body>
</html>
