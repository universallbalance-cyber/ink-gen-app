<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INK-GEN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --ink-black: #050505; --stencil-blue: #38bdf8; --skin-tone: #f3d5b5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; font-family: 'Outfit', sans-serif;
            overflow: hidden; 
        }

        .screen {
            position: fixed; inset: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; background: #000;
            z-index: 10;
        }

        #homePage { display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #151515 0%, #000 100%); overflow-y: auto; }
        
        .home-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 25px; width: 90%; max-width: 340px; text-align: center; backdrop-filter: blur(12px); position: relative; z-index: 20; }
        .header-font { font-family: 'Orbitron', sans-serif; }

        .style-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; color: #94a3b8; white-space: nowrap; flex-shrink: 0; }
        .style-btn.active { background: var(--stencil-blue); color: #000; border-color: var(--stencil-blue); }
        
        .gen-btn { background: var(--stencil-blue); color: #000; padding: 16px; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; width: 100%; cursor: pointer; border: none; }
        
        .sub-btn { width: 100%; padding: 12px; border-radius: 10px; margin-top: 8px; font-size: 10px; font-weight: 800; display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; text-transform: uppercase; cursor: pointer; }
        .sub-btn.featured { border-color: var(--stencil-blue); background: rgba(56, 189, 248, 0.1); }

        #artFrame { background: #fff; position: relative; width: 300px; height: 300px; margin: auto; border-radius: 4px; overflow: hidden; }
        .skin-overlay { position: absolute; inset: 0; background: var(--skin-tone); mix-blend-mode: multiply; opacity: 0; pointer-events: none; }
        .preview-active .skin-overlay { opacity: 1; }
        
        /* MODALS - Using 'hidden' instead of display:none to prevent touch-blocking */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }

        #musicPop { position: absolute; top: 60px; left: 10px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; display: none; z-index: 100; width: 150px; }
        
        .skin-swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .skin-swatch.active { border-color: var(--stencil-blue); transform: scale(1.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="helpModal" class="modal-overlay hidden">
        <div class="p-8 border border-sky-500/30 bg-black rounded-2xl text-center max-w-xs">
            <h2 class="header-font text-sky-400 text-xl mb-6 italic">OPERATIONS MANUAL</h2>
