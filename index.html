<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INK-GEN PRO | Professional Tattoo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ink-black: #050505; --stencil-blue: #38bdf8; --skin-tone: #f3d5b5; --gold: #f59e0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Core Layout Fix - Ensures visibility */
        html, body { 
            height: 100%; 
            width: 100%; 
            margin: 0; 
            padding: 0; 
            background: var(--ink-black); 
            color: #f8fafc; 
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .header-font { font-family: 'Orbitron', sans-serif; }

        #homePage { 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            width: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%); 
            align-items: center; 
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        #studioPage { 
            display: none; 
            flex-direction: column; 
            height: 100dvh; 
            width: 100%;
            background: #000;
        }
        
        .home-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
            border-radius: 1.5rem; 
            padding: 1.5rem; 
            width: 100%; 
            max-width: 340px; 
        }

        /* Buttons */
        .style-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.5rem 0.8rem; border-radius: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; color: #94a3b8; white-space: nowrap; flex-shrink: 0; }
        .style-btn.active { background: var(--stencil-blue); color: black; border-color: var(--stencil-blue); }
        .gen-btn { background: var(--stencil-blue); color: black; padding: 0.9rem; border-radius: 12px; font-size: 11px; font-weight: 900; text-transform: uppercase; width: 100%; }

        .sub-btn { width: 100%; padding: 0.8rem; border-radius: 12px; margin-top: 0.6rem; font-size: 10px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; color: white; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); text-transform: uppercase; }
        .sub-btn.featured { border-color: var(--stencil-blue); background: rgba(56, 189, 248, 0.1); }
