<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="referrer" content="no-referrer-when-downgrade">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INK-GEN PRO | Professional Tattoo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ink-black: #050505; --stencil-blue: #38bdf8; --skin-tone: #f3d5b5; --gold: #f59e0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }
        body { font-family: 'Outfit', sans-serif; background: var(--ink-black); color: #f8fafc; margin: 0; padding: 0; height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        .header-font { font-family: 'Orbitron', sans-serif; }

        /* HOME UI */
        #homePage { display: flex; flex-direction: column; height: 100dvh; overflow-y: auto; background: radial-gradient(circle at center, #111 0%, #000 100%); align-items: center; padding: 2rem 1rem; }
        .home-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 1.5rem; width: 100%; max-width: 340px; text-align: center; }
        
        /* SUBSCRIPTION BUTTONS */
        .sub-btn { width: 100%; padding: 0.8rem; border-radius: 12px; margin-top: 0.75rem; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; color: white; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }
        .sub-btn.featured { border-color: var(--stencil-blue); background: rgba(56, 189, 248, 0.1); }
        .credit-badge { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--gold); padding: 0.4rem 0.6rem; border-radius: 6px; font-size: 8px; font-weight: 900; display: flex; align-items: center; gap: 4px; }

        /* STUDIO UI */
        #studioPage { display: none; flex-direction: column; height: 100dvh; width: 100vw; position: relative; }
        .studio-header { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: rgba(5, 5, 5, 0.9); display: flex; justify-content: space-between; align-items: center; }
        .canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; background: #000; position: relative; }
        #artFrame { background: white; position: relative; width: min(85vw, 60vh); height: min(85vw, 60vh); border-radius: 4px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        .skin-overlay { position: absolute; inset: 0; background: var(--skin-tone); mix-blend-mode: multiply; opacity: 0; pointer-events: none; }
        #artFrame.preview-active .skin-overlay { opacity: 1; }
        
        .style-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem 0.75rem; border-radius: 6px; font-size: 8px; font-weight: 800; text-transform: uppercase; color: #94a3b8; }
        .style-btn.active { background: var(--stencil-blue); color: black; border-color: var(--stencil-blue); }
        .gen-btn { background: var(--stencil-blue); color: black; padding: 0.85rem; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; width: 100%; }
        .compact-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.85rem 1rem; font-size: 11px; width: 100%; color: white; outline: none; }

        #subOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        .skin-swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .skin-swatch.active { border-color: var(--stencil-blue); transform: scale(1.1); }
        
        #loader { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; }
        .ring { width: 30px; height: 30px; border: 2px solid rgba(56,189,248,0.1); border-top: 2px solid var(--stencil-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="subOverlay">
        <h2 class="header-font text-2xl font-black mb-6">OUT OF <span class="text-sky-400">INK</span></h2>
        <div class="w-full max-w-[300px]">
            <button onclick="buy(50)" class="sub-btn"><span>Fun Plan (50)</span><span class="text-sky-400">$19.99</span></button>
            <button onclick="buy(100)" class="sub-btn featured"><span>The Artist (100)</span><span class="text-sky-400">$49.99</span></button>
            <button onclick="buy(200)" class="sub-btn"><span>Tattoo Master (200)</span><span class="text-sky-400">$99.99</span></button>
        </div>
        <button onclick="document.getElementById('subOverlay').style.display='none'" class="mt-8 text-[8px] opacity-30 font-bold uppercase">Maybe Later</button>
    </div>

    <div id="helpModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px);">
        <div style="width: 85%; max-width: 400px; padding: 30px; border: 1px solid rgba(56, 189, 248, 0.2); background: #050505; border-radius: 4px; color: white; text-align: center;">
            <h2 class="header-font text-sky-400 mb-6">OPERATIONS MANUAL</h2>
            <div style="font-size: 11px; line-height: 2.5; opacity: 0.7; text-transform: uppercase; text-align: left;">
                <p>1. SET BASE CANVAS TONE</p>
                <p>2. ENTER DESIGN STUDIO</p>
                <p>3. INPUT CONCEPT PROMPT</p>
                <p>4. SELECT STYLE ARCHIVE</p>
                <p>5. ENGAGE ENGINE</p>
            </div>
            <button id="closeHelp" class="gen-btn mt-8">CLOSE MANUAL</button>
        </div>
    </div>

    <div id="homePage">
        <div class="mt-12 mb-8 text-center">
            <h1 class="header-font text-4xl font-black italic tracking-tighter">INK-GEN <span class="text-sky-400">PRO</span></h1>
            <p class="text-[8px] tracking-[0.4em] opacity-30 font-bold uppercase">Tattoo Image Engine</p>
        </div>

        <div class="home-card">
            <h2 class="header-font text-[9px] opacity-50 uppercase mb-4">Select Base Canvas</h2>
            <div class="flex justify-between mb-6">
                <div class="skin-swatch active" style="background: #f3d5b5;" data-color="#f3d5b5"></div>
                <div class="skin-swatch" style="background: #e5c298;" data-color="#e5c298"></div>
                <div class="skin-swatch" style="background: #c69061;" data-color="#c69061"></div>
                <div class="skin-swatch" style="background: #8d5524;" data-color="#8d5524"></div>
                <div class="skin-swatch" style="background: #3c2005;" data-color="#3c2005"></div>
            </div>
            <button id="enterStudio" class="gen-btn mb-6">Start Session</button>

            <div class="border-t border-white/5 pt-6">
                <h3 class="header-font text-[8px] opacity-30 uppercase mb-3 text-center">Subscription Plans</h3>
                <button onclick="buy(50)" class="sub-btn"><span>Fun Plan (50)</span><span class="text-sky-400">$19.99</span></button>
                <button onclick="buy(100)" class="sub-btn featured"><span>The Artist (100)</span><span class="text-sky-400">$49.99</span></button>
                <button onclick="buy(200)" class="sub-btn"><span>Tattoo Master (200)</span><span class="text-sky-400">$99.99</span></button>
            </div>
        </div>
        <button id="helpBtn" class="mt-6 opacity-30 text-[10px] font-bold">OPERATIONS MANUAL (?)</button>
        <div class="mt-4"><a href="privacy.html" class="header-font text-[7px] opacity-20 uppercase tracking-widest">Privacy Policy</a></div>
    </div>

    <div id="studioPage">
        <header class="studio-header">
            <button id="goHome" class="opacity-30"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></button>
            <div class="flex gap-2 items-center">
                <div class="credit-badge">
                    <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
                    <span id="inkVal">3</span>
                </div>
                <button id="skinTog" class="style-btn">Skin Preview</button>
                <button id="dlBtn" class="style-btn !px-2">DL</button>
            </div>
        </header>

        <div class="canvas-container">
            <div id="artFrame">
                <div class="skin-overlay"></div>
                <canvas id="tattooCanvas"></canvas>
                <div id="loader"><div class="ring"></div></div>
            </div>
        </div>

        <footer class="p-4 bg-black/95 border-t border-white/5">
            <div class="flex gap-2 overflow-x-auto pb-3 mb-2">
                <button class="style-btn active" data-style="fineline">Fine Line</button>
                <button class="style-btn" data-style="blackwork">Blackwork</button>
                <button class="style-btn" data-style="traditional">Trad</button>
                <button class="style-btn" data-style="skulls">Skulls</button>
            </div>
            <input type="text" id="promptInput" placeholder="DESCRIBE DESIGN" class="compact-input mb-2">
            <button id="generateBtn" class="gen-btn">Generate Ink</button>
        </footer>
    </div>

    <script>
        const BACKEND_URL = "https://ink-gen-api-365969989524.us-central1.run.app";
        let credits = 3;
        let selectedStyle = 'fineline';

        window.buy = (amt) => {
            credits += amt;
            document.getElementById('inkVal').innerText = credits;
            document.getElementById('subOverlay').style.display = 'none';
            alert("Ink Refilled!");
        };

        async function generate() {
            const btn = document.getElementById('generateBtn');
            const p = document.getElementById('promptInput').value;
            if (credits <= 0) { document.getElementById('subOverlay').style.display = 'flex'; return; }
            if (!p) return;

            try {
                btn.disabled = true; document.getElementById('loader').style.display = 'flex';
                const res = await fetch(BACKEND_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'generate', prompt: selectedStyle + " " + p })
                });
                const data = await res.json();
                if (data.predictions) {
                    credits--; document.getElementById('inkVal').innerText = credits;
                    const img = new Image();
                    img.onload = () => {
                        const ctx = document.getElementById('tattooCanvas').getContext('2d');
                        document.getElementById('tattooCanvas').width = 1024;
                        document.getElementById('tattooCanvas').height = 1024;
                        ctx.drawImage(img, 0, 0);
                        document.getElementById('loader').style.display = 'none';
                        btn.disabled = false;
                    };
                    img.src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                }
            } catch (e) { document.getElementById('loader').style.display = 'none'; btn.disabled = false; }
        }

        document.getElementById('enterStudio').onclick = () => { document.getElementById('homePage').style.display = 'none'; document.getElementById('studioPage').style.display = 'flex'; };
        document.getElementById('goHome').onclick = () => { document.getElementById('homePage').style.display = 'flex'; document.getElementById('studioPage').style.display = 'none'; };
        document.getElementById('generateBtn').onclick = generate;
        document.getElementById('skinTog').onclick = () => document.getElementById('artFrame').classList.toggle('preview-active');
        document.getElementById('helpBtn').onclick = () => document.getElementById('helpModal').style.display = 'flex';
        document.getElementById('closeHelp').onclick = () => document.getElementById('helpModal').style.display = 'none';
        document.getElementById('dlBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = 'tattoo.png';
            link.href = document.getElementById('tattooCanvas').toDataURL();
            link.click();
        };

        document.querySelectorAll('.skin-swatch').forEach(sw => {
            sw.onclick = () => {
                document.querySelectorAll('.skin-swatch').forEach(s => s.classList.remove('active'));
                sw.classList.add('active');
                document.documentElement.style.setProperty('--skin-tone', sw.dataset.color);
            };
        });

        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.onclick = () => {
                if(btn.dataset.style) {
                    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedStyle = btn.dataset.style;
                }
            };
        });
    </script>
</body>
</html>
